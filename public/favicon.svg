<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1a2e"/>
      <stop offset="100%" stop-color="#0d0b18"/>
    </linearGradient>
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff59a"/>
      <stop offset="100%" stop-color="#f5c842"/>
    </linearGradient>
    <linearGradient id="pav" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#a86000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="#f5c842" stroke-width="1" opacity="0.4"/>

  <!-- Crown -->
  <polygon points="16,3 21,11 11,11" fill="url(#crown)"/>
  <polygon points="16,3 11,11 7,8 11,3" fill="#f5c842"/>
  <polygon points="16,3 21,11 25,8 21,3" fill="#e8aa00"/>
  <polygon points="7,8 11,11 7,11" fill="#c47800"/>
  <polygon points="25,8 21,11 25,11" fill="#c47800"/>

  <!-- Girdle -->
  <line x1="7" y1="11" x2="25" y2="11" stroke="#fff" stroke-width="0.5" opacity="0.3"/>

  <!-- Pavilion -->
  <polygon points="11,11 21,11 16,29" fill="url(#pav)"/>
  <polygon points="7,11 11,11 16,29" fill="#b87000"/>
  <polygon points="25,11 21,11 16,29" fill="#d49200"/>

  <!-- Crown highlight -->
  <polygon points="16,5 19.5,11 12.5,11" fill="#fffde0" opacity="0.35"/>

  <!-- Sparkle -->
  <line x1="16" y1="3" x2="16" y2="1" stroke="#ffe566" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="13.5" y1="4.2" x2="12" y2="2.8" stroke="#ffe566" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="18.5" y1="4.2" x2="20" y2="2.8" stroke="#ffe566" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
</svg>
