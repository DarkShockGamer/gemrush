<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="60%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#c47f00"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </radialGradient>
    <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#f5c842" stroke-width="0.8" opacity="0.35"/>

  <!-- Gem shape: classic faceted diamond -->
  <!-- Top crown band -->
  <polygon points="16,4 22,11 10,11" fill="#ffe580" opacity="0.95"/>
  <!-- Left crown facet -->
  <polygon points="16,4 10,11 7,11 11,6" fill="#f5c842" opacity="0.9"/>
  <!-- Right crown facet -->
  <polygon points="16,4 22,11 25,11 21,6" fill="#ffd000" opacity="0.9"/>

  <!-- Pavilion (bottom half) - main face -->
  <polygon points="10,11 22,11 16,28" fill="url(#glow)" filter="url(#f)"/>
  <!-- Left pavilion facet (darker) -->
  <polygon points="7,11 10,11 16,28" fill="#c47f00" opacity="0.85"/>
  <!-- Right pavilion facet -->
  <polygon points="25,11 22,11 16,28" fill="#e8a800" opacity="0.8"/>

  <!-- Inner highlight on crown -->
  <polygon points="16,6 20,11 12,11" fill="#fff7a0" opacity="0.45"/>

  <!-- Center sparkle -->
  <line x1="16" y1="8.5" x2="16" y2="11" stroke="#fff" stroke-width="0.7" opacity="0.6"/>
  <line x1="14.5" y1="9.5" x2="17.5" y2="9.5" stroke="#fff" stroke-width="0.7" opacity="0.5"/>
</svg>
